# docker/vhost.conf
UseCanonicalName Off

# 1. THE FALLBACK / LOCALHOST BLOCK
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Turn on the rewrite engine
    RewriteEngine On
    
    # Condition 1 & 2: If the requested path is NOT a real file and NOT a real directory in the root...
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
    
    # ...then silently route the request to look inside the domains/ folder
    # $1 captures the domain name (my.gg), $2 captures any subpages (/about.html)
    RewriteRule ^/([^/]+)(/.*)?$ /domains/$1$2 [L]
</VirtualHost>

# 2. THE DYNAMIC HOSTING BLOCK (Keep this for the future if you ever want real domains)
<VirtualHost *:80>
    ServerAlias *.now *.gg *.com *.cz *.eu *.net *.org
    VirtualDocumentRoot "/var/www/html/domains/%0"

    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>