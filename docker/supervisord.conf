[supervisord]
nodaemon=true
user=root

[program:dnsmasq]
command=dnsmasq -k
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:dns_watcher]
command=/usr/local/bin/dns_watcher.sh
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0