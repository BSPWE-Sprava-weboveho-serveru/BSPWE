# docker/vhost.conf
UseCanonicalName Off

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html
</VirtualHost>

# Dynamic resolution
<VirtualHost *:80>
    # Add any that come to mind
    ServerAlias *.now *.gg *.com *.cz
    
    # %0 maps the whole domain to the folder name
    VirtualDocumentRoot "/var/www/html/%0"

    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>